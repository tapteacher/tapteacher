{% extends 'core/base.html' %}

{% block content %}
<div class="page-title-section">
    <h1>Teaching jobs in India</h1>
</div>

<div class="content-wrapper">
    <!-- Sidebar -->
    {% include 'core/includes/sidebar.html' %}

    <!-- Main Content Area -->
    <div class="main-display">
        <div class="main-display-header">
            <!-- Left Side: Back Button & Title -->
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="{% url 'home' %}?category={{ current_category }}" class="btn-header"
                    style="display: flex; align-items: center; gap: 5px;">
                    <span>&#8592;</span> Back to States
                </a>
                <h2 style="margin: 0;">{{ page_title }}</h2>
            </div>

            <!-- Right Side: Home Text Button -->
            <a href="{% url 'home' %}" class="btn-home">
                Home
            </a>
        </div>

        <div class="location-grid">
            {% for district in districts %}
            <div class="location-card {% if district in blinking_districts %}blink-red{% endif %}"
                onclick="window.location.href='{% url 'district_view' state_name=state_name district_name=district %}?category={{ current_category }}';">
                {{ district }}
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
